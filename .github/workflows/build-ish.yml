name: Cross-compile for iSH (i686-unknown-linux-musl)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-i686:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-musl

      - name: Install i686 musl cross-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools gcc-multilib

      - name: Build for i686-unknown-linux-musl
        run: cargo build --target i686-unknown-linux-musl --release
        env:
          CARGO_TARGET_I686_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc

      - name: Rename binary
        run: cp target/i686-unknown-linux-musl/release/hopchat hopchat-i686-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hopchat-i686-linux-musl
          path: hopchat-i686-linux-musl

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: hopchat-i686-linux-musl
