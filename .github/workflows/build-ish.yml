name: Cross-compile for iSH (i586 — no SSE2)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + i586 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i586-unknown-linux-musl

      - name: Install musl cross-compiler & 32-bit libs
        run: sudo apt-get update && sudo apt-get install -y musl-tools gcc-multilib

      - name: Build for i586-unknown-linux-musl (no SSE2)
        run: cargo build --target i586-unknown-linux-musl --release
        env:
          CARGO_TARGET_I586_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          # Force Pentium-class codegen — no SSE, no SSE2, no CMOV
          RUSTFLAGS: "-C target-cpu=pentium"

      - name: Rename binary
        run: cp target/i586-unknown-linux-musl/release/hopchat hopchat-ish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hopchat-ish
          path: hopchat-ish

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: hopchat-ish
          body: |
            ## HopChat ${{ github.ref_name }}

            ### iSH (iPhone) Binary
            Download `hopchat-ish` — a fully static i586 binary built without SSE/SSE2 instructions.
            Runs on iSH's x86 emulator out of the box.

            ```bash
            curl -LO https://github.com/Aditya-Giri-4356/hopchat/releases/download/${{ github.ref_name }}/hopchat-ish
            chmod +x hopchat-ish
            ./hopchat-ish
            ```
